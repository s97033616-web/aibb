<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Neo AI: Cold Logic v1.3</title>
    <style>
        :root {
            --bg: #020617;
            --panel: #0f172a;
            --accent: #64748b;
            --important: #94a3b8;
            --text: #cbd5e1;
        }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; }
        #app { width: 100%; max-width: 600px; height: 95vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        
        #dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; font-size: 0.8em; opacity: 0.8; }
        .stat-card { background: var(--panel); padding: 12px; border-radius: 4px; border-left: 2px solid var(--accent); }
        .stat-card b { color: #fff; font-size: 1.1em; }
        
        #chat { flex: 1; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #1e293b; display: flex; flex-direction: column; }
        .bubble { margin-bottom: 12px; max-width: 80%; padding: 10px 14px; border-radius: 4px; font-size: 0.95em; line-height: 1.6; position: relative; }
        .user { align-self: flex-end; background: #334155; color: #fff; border-right: 3px solid var(--important); }
        .ai { align-self: flex-start; background: #1e293b; color: var(--text); border-left: 3px solid #475569; }

        /* 세이브 버튼 영역 */
        #save-system { display: flex; gap: 10px; margin-bottom: 15px; }
        .save-btn { flex: 1; padding: 10px; font-size: 0.75em; cursor: pointer; background: var(--panel); border: 1px solid #1e293b; color: var(--accent); border-radius: 4px; transition: 0.3s; }
        .save-btn:hover { border-color: #fff; color: #fff; }

        #input-container { display: flex; gap: 10px; background: var(--panel); padding: 12px; border-radius: 4px; border: 1px solid #1e293b; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 1em; }
        button#send-btn { background: #1e293b; border: 1px solid #334155; color: white; padding: 8px 20px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button#send-btn:hover { background: #334155; border-color: var(--accent); }
    </style>
</head>
<body>

<div id="app">
    <h2 style="margin: 10px 0; color: var(--accent); letter-spacing: 2px; font-weight: 300;">NEO AI <span style="font-size: 0.5em; opacity: 0.5;">Priority Logic</span></h2>
    
    <div id="dashboard">
        <div class="stat-card">메모리<br><b id="synapse-count">0</b></div>
        <div class="stat-card">각인 단어<br><b id="priority-count">0</b></div>
        <div class="stat-card">상태<br><b id="mem-status">Standby</b></div>
    </div>

    <div id="save-system">
        <button class="save-btn" onclick="importMemory()">📥 기억 이식 (.json)</button>
        <button class="save-btn" onclick="exportMemory()">💾 기억 고정 (Save)</button>
    </div>

    <div id="chat"></div>

    <div id="input-container">
        <input id="input" placeholder="말해... 중요한 건 느낌표 붙이고." autocomplete="off">
        <button id="send-btn" onclick="process()">전송</button>
    </div>
</div>

<script>
    const brain = {
        // LocalStorage 로드
        memory: JSON.parse(localStorage.getItem('neo_cold_v2')) || {
            vocab: { n: [], v: [], a: [] },
            priority: [] 
        },
        save() {
            // 브라우저 내부 즉시 저장
            localStorage.setItem('neo_cold_v2', JSON.stringify(this.memory));
            this.updateUI();
        },
        updateUI() {
            const count = this.memory.vocab.n.length + this.memory.vocab.v.length;
            const pCount = this.memory.priority.length;
            document.getElementById('synapse-count').innerText = count;
            document.getElementById('priority-count').innerText = pCount;
            document.getElementById('mem-status').innerText = count > 0 ? "Active" : "Empty";
        }
    };

    // [수동 저장] JSON 파일 다운로드
    function exportMemory() {
        const data = JSON.stringify(brain.memory, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'memory.json'; // 파일명 고정
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // [불러오기] JSON 파일 읽기
    function importMemory() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = event => {
                try {
                    const imported = JSON.parse(event.target.result);
                    brain.memory = imported;
                    brain.save(); // LocalStorage 동기화
                    alert("기억을 성공적으로 이식했습니다.");
                    location.reload(); 
                } catch(err) {
                    alert("잘못된 기억 파일입니다.");
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function getRole(word) {
        if (word.length <= 1) return 'a'; 
        if (/[다요죠나니까어아니]/.test(word.slice(-1))) return 'v';
        return 'n';
    }

    function learn(text) {
        const isImportant = text.includes('!');
        const tokens = text.replace(/[!?]/g, '').split(/\s+/).filter(w => w.length > 0);
        
        tokens.forEach(word => {
            let cleaned = word.replace(/[요죠]$/, ""); 
            const role = getRole(cleaned);
            
            if (!brain.memory.vocab[role].includes(cleaned)) {
                brain.memory.vocab[role].push(cleaned);
            }

            if (isImportant) {
                if (!brain.memory.priority.includes(cleaned)) {
                    brain.memory.priority.push(cleaned);
                    if (brain.memory.priority.length > 15) brain.memory.priority.shift();
                }
            }
        });
    }

    const templates = [
        { structure: ['n', 'v'], suffix: "..." },
        { structure: ['n', 'n', 'v'], suffix: "... 그뿐이야." },
        { structure: ['a', 'n', 'v'], suffix: "... 관심 없어." },
        { structure: ['n', 'v'], suffix: "... 아마도." },
        { structure: ['v'], suffix: "... 귀찮게 하지 마." }
    ];

    function generateResponse(input) {
        const v = brain.memory.vocab;
        const p = brain.memory.priority;
        
        // 이름 응답은 유지
        if (input.includes("이름")) return "이름 같은 거 없어...";
        
        // 단어 데이터가 부족할 경우 예외 처리
        if (v.n.length < 1 || v.v.length < 1) {
            return input.includes("안녕") ? "어... 왔어. 근데 아직 아는 게 없어." : "아직 아는 게 없어... 더 말해봐.";
        }

        // 문장 생성을 위한 템플릿 선택 및 단어 조합
        const template = templates[Math.floor(Math.random() * templates.length)];
        let result = template.structure.map(role => {
            const list = v[role].length > 0 ? v[role] : v.n;
            const pMatch = p.filter(w => getRole(w) === role);
            if (pMatch.length > 0 && Math.random() > 0.6) {
                return pMatch[Math.floor(Math.random() * pMatch.length)];
            }
            return list[Math.floor(Math.random() * list.length)];
        });

        let final = result.join(' ') + template.suffix;
        
        // 우선순위 단어 추가 (확률적)
        if (p.length > 0 && Math.random() > 0.8) {
            final += ` 근데 ${p[Math.floor(Math.random() * p.length)]}... 이건 좀 그렇네.`;
        }

        // [수정 포인트] '안녕'이 포함되어 있으면 생성된 문장 앞에 인사를 붙임
        if (input.includes("안녕")) {
            return "어... 왔어. " + final;
        }

        return final;
    }

    function process() {
        const inputEl = document.getElementById('input');
        const text = inputEl.value.trim();
        if (!text) return;

        render('user', text);
        learn(text);
        
        setTimeout(() => {
            const reply = generateResponse(text);
            render('ai', reply);
            brain.save();
        }, 500);

        inputEl.value = "";
    }

    function render(type, text) {
        const chat = document.getElementById('chat');
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    document.getElementById('input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') process();
    });

    brain.updateUI();
</script>

</body>
</html>
